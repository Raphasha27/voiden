# Publishes the Linux .deb produced by "Release Voiden App" to the APT repo (S3)
# and the Snap Store.
#
# Split out of release-app.yml so a flaky apt/snap publish (e.g. transient
# snapd/core22 install failures on GitHub-hosted runners) can be retried on its
# own, without rebuilding macOS/Linux artifacts or re-cutting the GitHub Release.
#
# Trigger:
#   - workflow_call — invoked by release-app.yml right after the Linux build,
#     reusing that run's "voiden-linux-x64" artifact.
#   - workflow_dispatch — manual retry. Defaults to pulling the artifact from
#     this same run; pass `run_id` to pull from an earlier "Release Voiden App"
#     run instead (e.g. retrying after the build already succeeded elsewhere).
#
# Required repository secrets:
#   S3_ACCESS_KEY_ID_BETA / S3_SECRET_ACCESS_KEY_BETA / S3_BUCKET_NAME_BETA
#   S3_ACCESS_KEY_ID_STABLE / S3_SECRET_ACCESS_KEY_STABLE / S3_BUCKET_NAME_STABLE
#   VOIDEN_GPG_PRIVATE_KEY / VOIDEN_GPG_KEY_ID / VOIDEN_GPG_PASSPHRASE — apt signing
#                                 (omit VOIDEN_GPG_PRIVATE_KEY to publish an unsigned repo)
#   SNAPCRAFT_STORE_CREDENTIALS — output of `snapcraft export-login -`

name: Release Package Managers

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - beta
          - stable
      run_id:
        description: 'Run ID of a "Release Voiden App" run to pull the linux-x64 .deb from (blank = this run)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  publish:
    name: Publish APT + Snap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Only need node_modules for publish-apt.js / publish-snap.js (dotenv, aws-sdk) —
      # no plugin builds needed to repackage an already-built .deb.
      - name: Install dependencies
        run: yarn install

      # Pre-install core22 (and wait for snapd to settle) before snapcraft's build
      # tries to auto-install it — doing both right after `snap install snapcraft`
      # races snapd and intermittently fails with "Error installing snap 'core22'".
      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
          sudo snap wait system seed.loaded
          sudo snap install core22

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: voiden-linux-x64
          path: apps/electron/out/make/
          run-id: ${{ inputs.run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG signing key
        env:
          VOIDEN_GPG_PRIVATE_KEY: ${{ secrets.VOIDEN_GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$VOIDEN_GPG_PRIVATE_KEY" ]; then
            echo "$VOIDEN_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          else
            echo "VOIDEN_GPG_PRIVATE_KEY not set — apt repo will publish unsigned."
          fi

      # Not mandatory for a successful release — apt/snap failures are reported but don't fail the job.
      - name: Publish APT repo
        id: publish-apt
        continue-on-error: true
        working-directory: apps/electron
        env:
          S3_ACCESS_KEY_ID_BETA: ${{ secrets.S3_ACCESS_KEY_ID_BETA }}
          S3_SECRET_ACCESS_KEY_BETA: ${{ secrets.S3_SECRET_ACCESS_KEY_BETA }}
          S3_ACCESS_KEY_ID_STABLE: ${{ secrets.S3_ACCESS_KEY_ID_STABLE }}
          S3_SECRET_ACCESS_KEY_STABLE: ${{ secrets.S3_SECRET_ACCESS_KEY_STABLE }}
          S3_BUCKET_NAME_BETA: ${{ secrets.S3_BUCKET_NAME_BETA }}
          S3_BUCKET_NAME_STABLE: ${{ secrets.S3_BUCKET_NAME_STABLE }}
          VOIDEN_GPG_KEY_ID: ${{ secrets.VOIDEN_GPG_KEY_ID }}
          VOIDEN_GPG_PASSPHRASE: ${{ secrets.VOIDEN_GPG_PASSPHRASE }}
        run: node publish-apt.js ${{ inputs.channel }}

      - name: Report APT publish failure
        if: steps.publish-apt.outcome == 'failure'
        run: echo "::warning::APT repo publish failed — continuing without it. Check the 'Publish APT repo' step logs." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Publish Snap
        id: publish-snap
        continue-on-error: true
        working-directory: apps/electron
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: node publish-snap.js ${{ inputs.channel }}

      - name: Report Snap publish failure
        if: steps.publish-snap.outcome == 'failure'
        run: echo "::warning::Snap Store publish failed — continuing without it. Check the 'Publish Snap' step logs." | tee -a "$GITHUB_STEP_SUMMARY"
